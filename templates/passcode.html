<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HomeCloud</title>
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <main class="page-shell">
        <div class="container" style="max-width:560px;">
            <section class="panel">
                <h1 class="page-title">Enter Passcode</h1>
                <p class="page-subtitle">Access is private. Enter your passcode to continue to your authorized area.</p>

                {% with messages = get_flashed_messages(with_categories=true) %}
                    {% if messages %}
                        <div class="flash-list">
                            {% for category, message in messages %}
                                <div class="flash">{{ message }}</div>
                            {% endfor %}
                        </div>
                    {% endif %}
                {% endwith %}

                <form method="post" class="form-stack" style="margin-top:14px;">
                    <input type="password" name="code" placeholder="Enter passcode" autocomplete="off" required>
                    <button type="submit" class="btn" style="width:100%;">Unlock</button>
                </form>

                <div class="actions-row" style="justify-content:center; margin-top:14px;">
                    <a href="{{ url_for('home') }}" class="btn secondary">Back to Home</a>
                </div>
            </section>
        </div>
    </main>
</body>
</html>

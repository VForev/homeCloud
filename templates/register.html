<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HomeCloud</title>
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <main class="page-shell">
        <div class="container" style="max-width:560px;">
            <section class="panel">
                <h1 class="page-title">Create Account</h1>
                <p class="page-subtitle">Register a new account to sign in.</p>

                <form method="post" class="form-stack" style="margin-top:14px;">
                    <input type="text" name="username" placeholder="Choose Username" required>
                    <input type="password" name="password" placeholder="Choose Password" required>
                    <button type="submit" class="btn" style="width:100%;">Register</button>
                </form>

                <p class="helper-text" style="margin:14px 0 0;">Already have an account? <a href="{{ url_for('login') }}">Login</a></p>
            </section>
        </div>
    </main>
</body>
</html>

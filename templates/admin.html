<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Image Gallery</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .gallery {
            max-height: calc(100vh - 360px);
            overflow-y: auto;
        }

        .image-card {
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        .gallery img.selected {
            box-shadow: 0 0 0 3px rgba(255, 93, 115, 0.8);
        }

        #deleteSelectedBtn {
            margin: 16px auto 0;
            min-width: 220px;
        }

        #deleteSelectedBtn:disabled {
            opacity: 0.5;
        }

        @media (max-width: 700px) {
            .gallery {
                max-height: none;
                overflow-y: visible;
            }
        }
    </style>
</head>
<body>
    <main class="page-shell">
    <div class="container">
        <div class="top-bar">
            <h1 class="page-title" style="text-align:center;">Admin Gallery</h1>
            <p class="page-subtitle" style="text-align:center;">Select multiple images and delete in one action.</p>

            <div class="actions-row" style="justify-content:center;">
                <a href="{{ url_for('logout') }}" class="btn secondary">Logout</a>
                <button id="deleteSelectedBtn" class="btn danger" disabled>Delete Selected</button>
            </div>

            <p class="helper-text" style="text-align:center; margin-top:8px;">Click image to preview. Use checkboxes to mark images for deletion.</p>
        </div>

        <div class="gallery">
            {% for image in images %}
            <div class="image-card">
                <input type="checkbox" class="image-checkbox" data-filename="{{ image }}">
                <img src="/images/{{ image }}" alt="{{ image }}" data-index="{{ loop.index0 }}">
            </div>
            {% endfor %}
        </div>
    </div>
    </main>

    <div class="lightbox" id="lightbox">
        <button class="nav-btn prev" onclick="prevImage()">&#10094;</button>
        <img id="lightboxImage" src="">
        <button class="nav-btn next" onclick="nextImage()">&#10095;</button>
    </div>

    <script>
        const galleryImgs = Array.from(document.querySelectorAll('.gallery img'));
        let currentIndex = 0;
        const lightbox = document.getElementById('lightbox');
        const lightboxImage = document.getElementById('lightboxImage');

        function openLightbox(index) {
            currentIndex = index;
            showImage();
            lightbox.classList.add('show');
        }
        function showImage() {
            lightboxImage.src = galleryImgs[currentIndex].src;
        }
        function closeLightbox() {
            lightbox.classList.remove('show');
        }
        function nextImage() {
            currentIndex = (currentIndex + 1) % galleryImgs.length;
            showImage();
        }
        function prevImage() {
            currentIndex = (currentIndex - 1 + galleryImgs.length) % galleryImgs.length;
            showImage();
        }

        lightbox.addEventListener('click', e => {
            if (e.target === lightbox) closeLightbox();
        });

        let startX = 0;
        lightbox.addEventListener('touchstart', e => startX = e.touches[0].clientX);
        lightbox.addEventListener('touchend', e => {
            const endX = e.changedTouches[0].clientX;
            if (startX - endX > 50) nextImage();
            if (endX - startX > 50) prevImage();
        });

        document.querySelectorAll('.image-card').forEach((card, idx) => {
            card.querySelector('img').addEventListener('click', (e) => {
                if (e.target === card.querySelector('.image-checkbox')) return;
                openLightbox(idx);
            });
        });

        const checkboxes = document.querySelectorAll('.image-checkbox');
        const deleteSelectedBtn = document.getElementById('deleteSelectedBtn');

        checkboxes.forEach(checkbox => {
            checkbox.addEventListener('change', updateDeleteBtn);
        });

        function updateDeleteBtn() {
            const checked = document.querySelectorAll('.image-checkbox:checked');
            deleteSelectedBtn.disabled = checked.length === 0;
            galleryImgs.forEach((img, idx) => {
                if (checkboxes[idx].checked) {
                    img.classList.add('selected');
                } else {
                    img.classList.remove('selected');
                }
            });
        }

        deleteSelectedBtn.addEventListener('click', function() {
            const selected = [...document.querySelectorAll('.image-checkbox:checked')];
            if (selected.length === 0) return;
            if (!confirm(`Delete ${selected.length} selected image(s)?`)) return;
            deleteSelectedBtn.disabled = true;
            let remaining = selected.length;
            selected.forEach(checkbox => {
                const filename = checkbox.getAttribute('data-filename');
                fetch('/delete_image', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                    body: 'filename=' + encodeURIComponent(filename)
                })
                .then(r => r.json())
                .then(data => {
                    if (data.success) {
                        const card = checkbox.closest('.image-card');
                        card.parentNode.removeChild(card);
                    }
                    if (--remaining === 0) {
                        updateDeleteBtn();
                        deleteSelectedBtn.disabled = false;
                    }
                })
                .catch(() => {
                    if (--remaining === 0) {
                        updateDeleteBtn();
                        deleteSelectedBtn.disabled = false;
                    }
                });
            });
        });

        document.addEventListener("DOMContentLoaded", function() {
            const overlay = document.getElementById("loadingOverlay");
            let loaded = 0;
            let total = galleryImgs.length;
            if (!overlay) return;
            if (total === 0) {
                overlay.style.display = "none";
                return;
            }
            function hideOverlay() {
                overlay.style.opacity = "0";
                setTimeout(() => { overlay.style.display = "none"; }, 320);
            }
            galleryImgs.forEach(img => {
                if (img.complete) {
                    loaded++;
                    if (loaded >= total) hideOverlay();
                } else {
                    img.addEventListener('load', () => {
                        loaded++;
                        if (loaded >= total) hideOverlay();
                    });
                    img.addEventListener('error', () => {
                        loaded++;
                        if (loaded >= total) hideOverlay();
                    });
                }
            });
        });
    </script>

    <div id="loadingOverlay" style="position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.82);display:flex;justify-content:center;align-items:center;z-index:9999;">
        <div class="spinner"></div>
    </div>

</body>
</html>

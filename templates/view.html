<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Only Gallery</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .gallery {
            max-height: calc(100vh - 280px);
            overflow-y: auto;
        }

        @media (max-width: 700px) {
            .gallery {
                max-height: none;
                overflow-y: visible;
            }
        }
    </style>
</head>
<body>
    <main class="page-shell">
    <div class="container">
        <div class="top-bar">
            <h1 class="page-title" style="text-align:center;">Gallery Viewer</h1>
            <p class="page-subtitle" style="text-align:center;">Browse images in full size with a clean, private view-only experience.</p>

            <div class="actions-row" style="justify-content:center;">
                <a href="{{ url_for('logout') }}" class="btn secondary">Logout</a>
            </div>

            <p class="helper-text" style="text-align:center; margin-top:8px;">Click an image for full size. Use arrows or swipe left/right.</p>
        </div>

        <div class="gallery">
            {% for image in images %}
                <img src="/images/{{ image }}" alt="{{ image }}" data-index="{{ loop.index0 }}">
            {% endfor %}
        </div>
    </div>
    </main>

    <div class="lightbox" id="lightbox">
        <button class="nav-btn prev" onclick="prevImage()">&#10094;</button>
        <img id="lightboxImage" src="">
        <button class="nav-btn next" onclick="nextImage()">&#10095;</button>
    </div>

    <script>
        const galleryImgs = Array.from(document.querySelectorAll('.gallery img'));
        let currentIndex = 0;
        const lightbox = document.getElementById('lightbox');
        const lightboxImage = document.getElementById('lightboxImage');
        function openLightbox(index) {
            currentIndex = index;
            showImage();
            lightbox.classList.add('show');
        }
        function showImage() {
            lightboxImage.src = galleryImgs[currentIndex].src;
        }
        function closeLightbox() {
            lightbox.classList.remove('show');
        }
        function nextImage() {
            currentIndex = (currentIndex + 1) % galleryImgs.length;
            showImage();
        }
        function prevImage() {
            currentIndex = (currentIndex - 1 + galleryImgs.length) % galleryImgs.length;
            showImage();
        }
        lightbox.addEventListener('click', e => { if (e.target === lightbox) closeLightbox(); });
        let startX = 0;
        lightbox.addEventListener('touchstart', e => startX = e.touches[0].clientX);
        lightbox.addEventListener('touchend', e => {
            const endX = e.changedTouches[0].clientX;
            if (startX - endX > 50) nextImage();
            if (endX - startX > 50) prevImage();
        });
        document.querySelectorAll('.gallery img').forEach((img, idx) => {
            img.addEventListener('click', function() {
                openLightbox(idx);
            });
        });

        document.addEventListener("DOMContentLoaded", function() {
            const overlay = document.getElementById("loadingOverlay");
            let loaded = 0;
            let total = galleryImgs.length;
            if (!overlay) return;
            if (total === 0) {
                overlay.style.display = "none";
                return;
            }
            function hideOverlay() {
                overlay.style.opacity = "0";
                setTimeout(() => { overlay.style.display = "none"; }, 320);
            }
            galleryImgs.forEach(img => {
                if (img.complete) {
                    loaded++;
                    if (loaded >= total) hideOverlay();
                } else {
                    img.addEventListener('load', () => {
                        loaded++;
                        if (loaded >= total) hideOverlay();
                    });
                    img.addEventListener('error', () => {
                        loaded++;
                        if (loaded >= total) hideOverlay();
                    });
                }
            });
        });
    </script>

    <div id="loadingOverlay" style="position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.82);display:flex;justify-content:center;align-items:center;z-index:9999;">
        <div class="spinner"></div>
    </div>

</body>
</html>

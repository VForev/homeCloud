<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VFore AI Local Private</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='local_ollama_ui.css') }}" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <h1>VFore AI • Local & Private</h1>
        <div class="status-row">
          <div id="status" class="status">Loading models...</div>
          <div id="chatMeta" class="meta-pill">0 messages</div>
        </div>
      </div>
      <div class="top-actions">
        <details id="settingsMenu" class="settings-menu">
          <summary id="settingsToggle" class="mini-btn">AI Settings</summary>
          <div id="settingsPopover" class="settings-popover">
            <label class="field-label" for="model">Model</label>
            <select id="model" class="select"></select>

            <div class="field-grid">
              <label class="field-block" for="temperature">
                <span class="field-label">Temperature</span>
                <input id="temperature" class="number-input" type="number" min="0" max="2" step="0.1" value="0.7" title="Temperature" />
              </label>
              <label class="field-block" for="numPredict">
                <span class="field-label">Max Tokens</span>
                <input id="numPredict" class="number-input" type="number" min="64" max="4096" step="64" value="512" title="Max tokens" />
              </label>
            </div>

            <div class="stack-actions">
              <button id="refreshBtn" class="btn secondary" type="button">Refresh Models</button>
              <button id="clearBtn" class="btn danger" type="button">Clear Chat</button>
            </div>
          </div>
        </details>

        <a href="{{ url_for('logout') }}" class="btn secondary">Logout</a>
      </div>
    </header>

    <div class="workspace">
      <section class="chat-panel">
        <div id="chat" class="chat">
          <div id="empty" class="empty">
            Choose a model, write a prompt, and send. Attach one image when needed.
          </div>
        </div>

        <form id="composer" class="composer">
          <div class="composer-top">
            <span class="field-label">Prompt</span>
            <span id="promptCount" class="hint-chip">0 chars</span>
          </div>

          <div class="composer-row">
            <div class="prompt-stack">
              <div class="prompt-wrap">
                <textarea id="prompt" class="textarea" placeholder="Ask something..."></textarea>
                <label for="imageInput" class="mini-btn attach-btn">+ Img</label>
                <input id="imageInput" class="hidden" type="file" accept="image/*" />
              </div>

              <div id="attachmentBadge" class="attachment-badge hidden">
                <img id="imagePreview" class="attachment-thumb" alt="Attached image preview" />
                <div id="fileInfo" class="file-pill compact"></div>
                <button id="removeImageBtn" class="mini-btn remove-attach" type="button">x</button>
              </div>
            </div>
            <div class="buttons">
              <button id="sendBtn" class="btn" type="submit">Send</button>
            </div>
          </div>

          <div class="hint">Enter to send. Shift+Enter for a new line.</div>
        </form>
      </section>
    </div>
  </div>

  <script src="{{ url_for('static', filename='local_ollama_ui.js') }}"></script>
</body>
</html>

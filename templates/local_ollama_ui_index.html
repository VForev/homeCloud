<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VFore AI Minimal</title>
  <style>
    :root {
      --bg: #0b1020;
      --panel: #121a30;
      --panel-2: #1a2542;
      --line: rgba(255,255,255,0.08);
      --text: #eef2ff;
      --muted: #aab4d6;
      --accent: #7c9cff;
      --danger: #ff8c8c;
      --radius: 16px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      height: 100%;
      background: linear-gradient(180deg, #0a1020 0%, #0e1530 100%);
      color: var(--text);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px;
    }

    .app {
      width: min(100%, 980px);
      height: min(92vh, 900px);
      border: 1px solid var(--line);
      background: var(--panel);
      border-radius: 22px;
      overflow: hidden;
      display: grid;
      grid-template-rows: auto 1fr auto;
      box-shadow: 0 20px 60px rgba(0,0,0,0.35);
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
      background: rgba(255,255,255,0.02);
      flex-wrap: wrap;
    }

    .brand {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .brand h1 {
      margin: 0;
      font-size: 1.05rem;
    }

    .status {
      color: var(--muted);
      font-size: 0.9rem;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    select, textarea, button, input {
      font: inherit;
    }

    .select, .textarea, .number-input {
      border: 1px solid var(--line);
      background: var(--panel-2);
      color: var(--text);
      border-radius: 12px;
      outline: none;
    }

    .select, .number-input {
      padding: 10px 12px;
      min-width: 120px;
    }

    .select {
      min-width: 220px;
    }

    .chat {
      overflow: auto;
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      background: rgba(255,255,255,0.01);
    }

    .empty {
      margin: auto;
      text-align: center;
      color: var(--muted);
      max-width: 520px;
      line-height: 1.6;
    }

    .msg {
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-width: 90%;
    }

    .msg.user { align-self: flex-end; }
    .msg.assistant { align-self: flex-start; }
    .msg.system { align-self: center; max-width: 100%; }

    .role {
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 0 4px;
    }

    .bubble {
      padding: 14px 16px;
      border-radius: 18px;
      border: 1px solid var(--line);
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      line-height: 1.6;
    }

    .user .bubble { background: rgba(124,156,255,0.18); }
    .assistant .bubble { background: rgba(255,255,255,0.04); }
    .system .bubble { background: rgba(255,140,140,0.10); }

    .bubble h1, .bubble h2, .bubble h3 {
      margin: 0 0 12px;
      line-height: 1.3;
    }

    .bubble p {
      margin: 0 0 12px;
    }

    .bubble p:last-child {
      margin-bottom: 0;
    }

    .bubble ul, .bubble ol {
      margin: 6px 0 12px 22px;
      padding: 0;
    }

    .bubble code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      background: rgba(255,255,255,0.08);
      padding: 2px 6px;
      border-radius: 7px;
      font-size: 0.95em;
    }

    .bubble pre {
      margin: 14px 0;
      background: rgba(0,0,0,0.28);
      padding: 14px;
      border-radius: 14px;
      overflow: auto;
      border: 1px solid rgba(255,255,255,0.06);
    }

    .bubble pre code {
      background: transparent;
      padding: 0;
      border-radius: 0;
    }

    .assistant-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      padding-left: 4px;
    }

    .chip-btn {
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.04);
      color: var(--muted);
      border-radius: 999px;
      padding: 7px 12px;
      cursor: pointer;
      font-size: 0.82rem;
    }

    .chip-btn:hover {
      color: var(--text);
      border-color: rgba(124, 156, 255, 0.28);
    }

    .composer {
      border-top: 1px solid var(--line);
      padding: 14px;
      display: grid;
      gap: 12px;
      background: rgba(255,255,255,0.02);
    }

    .file-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    .file-pill {
      color: var(--muted);
      font-size: 0.9rem;
      border: 1px solid var(--line);
      padding: 8px 10px;
      border-radius: 999px;
      background: rgba(255,255,255,0.03);
    }

    .image-preview-wrap {
      display: none;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    .image-preview-wrap.show {
      display: flex;
    }

    .image-preview {
      width: 120px;
      height: 120px;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.03);
      flex: 0 0 auto;
    }

    .image-preview img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .image-meta {
      color: var(--muted);
      font-size: 0.88rem;
      line-height: 1.5;
    }

    .composer-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: end;
    }

    .textarea {
      width: 100%;
      min-height: 110px;
      resize: vertical;
      padding: 14px;
    }

    .buttons {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .btn {
      border: 0;
      border-radius: 12px;
      padding: 12px 14px;
      cursor: pointer;
      color: white;
      background: var(--accent);
      font-weight: 600;
    }

    .btn.secondary {
      background: rgba(255,255,255,0.08);
      border: 1px solid var(--line);
      color: var(--text);
    }

    .btn.danger {
      background: rgba(255,140,140,0.16);
      border: 1px solid rgba(255,140,140,0.25);
      color: #ffdede;
    }

    .hint {
      color: var(--muted);
      font-size: 0.85rem;
    }

    .hidden { display: none !important; }

    @media (max-width: 720px) {
      .app {
        height: 100vh;
        width: 100%;
        border-radius: 0;
      }

      body { padding: 0; }

      .composer-row {
        grid-template-columns: 1fr;
      }

      .buttons {
        flex-direction: row;
      }

      .buttons .btn { flex: 1; }

      .select { min-width: 0; width: 100%; }
      .number-input { min-width: 0; width: 100px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="brand">
        <h1>VFore AI Minimal</h1>
        <div id="status" class="status">Loading models...</div>
      </div>
      <div class="controls">
        <select id="model" class="select"></select>
        <input id="temperature" class="number-input" type="number" min="0" max="2" step="0.1" value="0.7" title="Temperature" />
        <input id="numPredict" class="number-input" type="number" min="64" max="4096" step="64" value="512" title="Max tokens" />
        <button id="refreshBtn" class="btn secondary" type="button">Refresh</button>
        <button id="clearBtn" class="btn danger" type="button">Clear</button>
      </div>
    </div>

    <div id="chat" class="chat">
      <div id="empty" class="empty">
        Pick a model, type a message, and send it. You can also attach one image. This version is intentionally minimal and uses non-streaming chat for reliability.
      </div>
    </div>

    <form id="composer" class="composer">
      <div class="file-row">
        <div id="fileInfo" class="file-pill hidden"></div>
        <div>
          <label for="imageInput" class="btn secondary" style="display:inline-block;">Upload Image</label>
          <input id="imageInput" class="hidden" type="file" accept="image/*" />
        </div>
      </div>

      <div id="imagePreviewWrap" class="image-preview-wrap">
        <div class="image-preview">
          <img id="imagePreview" alt="Selected image preview" />
        </div>
        <div class="image-meta" id="imageMeta"></div>
      </div>

      <div class="composer-row">
        <textarea id="prompt" class="textarea" placeholder="Ask something..."></textarea>
        <div class="buttons">
          <button id="sendBtn" class="btn" type="submit">Send</button>
          <button id="removeImageBtn" class="btn secondary hidden" type="button">Remove Image</button>
        </div>
      </div>

      <div class="hint">Enter to send. Shift+Enter for a new line.</div>
    </form>
  </div>

  <script>
    const state = {
      messages: [],
      models: [],
      imageBase64: null,
      imageMime: null,
      imageName: null,
      imagePreviewUrl: null,
      imageWidth: null,
      imageHeight: null,
      busy: false
    };

    const el = {
      status: document.getElementById('status'),
      model: document.getElementById('model'),
      temperature: document.getElementById('temperature'),
      numPredict: document.getElementById('numPredict'),
      refreshBtn: document.getElementById('refreshBtn'),
      clearBtn: document.getElementById('clearBtn'),
      chat: document.getElementById('chat'),
      empty: document.getElementById('empty'),
      composer: document.getElementById('composer'),
      prompt: document.getElementById('prompt'),
      sendBtn: document.getElementById('sendBtn'),
      imageInput: document.getElementById('imageInput'),
      fileInfo: document.getElementById('fileInfo'),
      removeImageBtn: document.getElementById('removeImageBtn'),
      imagePreviewWrap: document.getElementById('imagePreviewWrap'),
      imagePreview: document.getElementById('imagePreview'),
      imageMeta: document.getElementById('imageMeta')
    };

    function setStatus(text) {
      el.status.textContent = text;
    }

    function escapeHtml(text) {
      return String(text ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }

    function renderMarkdown(text) {
      const escaped = escapeHtml(text);
      const codeBlocks = [];
      let temp = escaped.replace(/```([\s\S]*?)```/g, (_, code) => {
        const key = `__CODEBLOCK_${codeBlocks.length}__`;
        codeBlocks.push(`<pre><code>${code.trim()}</code></pre>`);
        return key;
      });

      temp = temp
        .replace(/^### (.*)$/gm, '<h3>$1</h3>')
        .replace(/^## (.*)$/gm, '<h2>$1</h2>')
        .replace(/^# (.*)$/gm, '<h1>$1</h1>')
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.*?)\*/g, '<em>$1</em>')
        .replace(/`([^`]+)`/g, '<code>$1</code>');

      const lines = temp.split('\n');
      const html = [];
      let inUl = false;
      let inOl = false;

      function closeLists() {
        if (inUl) {
          html.push('</ul>');
          inUl = false;
        }
        if (inOl) {
          html.push('</ol>');
          inOl = false;
        }
      }

      for (const line of lines) {
        if (/^[-*]\s+/.test(line)) {
          if (inOl) {
            html.push('</ol>');
            inOl = false;
          }
          if (!inUl) {
            html.push('<ul>');
            inUl = true;
          }
          html.push(`<li>${line.replace(/^[-*]\s+/, '')}</li>`);
        } else if (/^\d+\.\s+/.test(line)) {
          if (inUl) {
            html.push('</ul>');
            inUl = false;
          }
          if (!inOl) {
            html.push('<ol>');
            inOl = true;
          }
          html.push(`<li>${line.replace(/^\d+\.\s+/, '')}</li>`);
        } else {
          closeLists();
          if (line.trim() === '') {
            html.push('');
          } else if (/^<h[1-3]>/.test(line) || /^<pre>/.test(line)) {
            html.push(line);
          } else {
            html.push(`<p>${line}</p>`);
          }
        }
      }
      closeLists();

      let finalHtml = html.join('');
      codeBlocks.forEach((block, index) => {
        finalHtml = finalHtml.replace(`__CODEBLOCK_${index}__`, block);
      });
      return finalHtml;
    }

    function createAssistantActions(messageText) {
      const actions = document.createElement('div');
      actions.className = 'assistant-actions';

      const copyBtn = document.createElement('button');
      copyBtn.className = 'chip-btn';
      copyBtn.type = 'button';
      copyBtn.textContent = 'Copy';
      copyBtn.addEventListener('click', async () => {
        try {
          await navigator.clipboard.writeText(messageText);
          setStatus('Copied response');
        } catch (error) {
          setStatus('Copy failed');
        }
      });

      const reuseBtn = document.createElement('button');
      reuseBtn.className = 'chip-btn';
      reuseBtn.type = 'button';
      reuseBtn.textContent = 'Use as prompt';
      reuseBtn.addEventListener('click', () => {
        el.prompt.value = messageText;
        el.prompt.focus();
        setStatus('Response copied into prompt box');
      });

      actions.append(copyBtn, reuseBtn);
      return actions;
    }

    function renderMessages() {
      el.chat.innerHTML = '';

      if (!state.messages.length) {
        el.chat.appendChild(el.empty);
        return;
      }

      for (const message of state.messages) {
        const wrapper = document.createElement('div');
        wrapper.className = `msg ${message.role}`;

        const role = document.createElement('div');
        role.className = 'role';
        role.textContent = message.role;

        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        if (message.role === 'assistant') {
          bubble.innerHTML = renderMarkdown(message.content);
        } else {
          bubble.textContent = message.content;
        }

        wrapper.appendChild(role);
        wrapper.appendChild(bubble);

        if (message.role === 'assistant') {
          wrapper.appendChild(createAssistantActions(message.content));
        }

        el.chat.appendChild(wrapper);
      }

      el.chat.scrollTop = el.chat.scrollHeight;
    }

    function renderImageInfo() {
      if (!state.imageBase64) {
        el.fileInfo.classList.add('hidden');
        el.removeImageBtn.classList.add('hidden');
        el.imagePreviewWrap.classList.remove('show');
        el.fileInfo.textContent = '';
        el.imageMeta.textContent = '';
        el.imagePreview.removeAttribute('src');
        return;
      }

      el.fileInfo.classList.remove('hidden');
      el.removeImageBtn.classList.remove('hidden');
      el.imagePreviewWrap.classList.add('show');
      el.fileInfo.textContent = `Image attached: ${state.imageName}`;
      el.imagePreview.src = state.imagePreviewUrl || '';

      const approxKb = Math.max(1, Math.round((state.imageBase64.length * 3 / 4) / 1024));
      const dims = state.imageWidth && state.imageHeight
        ? `${state.imageWidth}×${state.imageHeight}px`
        : 'resized image';
      el.imageMeta.textContent = `${dims} • ~${approxKb} KB sent to model`;
    }

    function renderModels() {
      const current = el.model.value;
      el.model.innerHTML = '';

      if (!state.models.length) {
        const option = document.createElement('option');
        option.value = '';
        option.textContent = 'No models found';
        el.model.appendChild(option);
        return;
      }

      for (const model of state.models) {
        const option = document.createElement('option');
        option.value = model;
        option.textContent = model;
        el.model.appendChild(option);
      }

      if (state.models.includes(current)) {
        el.model.value = current;
      } else {
        const preferred = state.models.find(name => name.includes('qwen3-vl')) || state.models[0];
        el.model.value = preferred;
      }
    }

    async function loadModels() {
      setStatus('Loading models...');
      try {
        const response = await fetch('/api/ollama/api/tags', { cache: 'no-store' });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const data = await response.json();
        state.models = (data.models || []).map(model => model.name);
        renderModels();
        setStatus(`Ready • ${state.models.length} model${state.models.length === 1 ? '' : 's'}`);
      } catch (error) {
        setStatus(`Could not load models: ${error.message}`);
      }
    }

    function loadImageElement(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => {
          const img = new Image();
          img.onload = () => resolve({ img, dataUrl: String(reader.result || '') });
          img.onerror = reject;
          img.src = String(reader.result || '');
        };
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    async function imageFileToOptimizedBase64(file) {
      const { img, dataUrl } = await loadImageElement(file);
      const maxSide = 1024;
      let width = img.width;
      let height = img.height;

      if (width > height && width > maxSide) {
        height = Math.round((height * maxSide) / width);
        width = maxSide;
      } else if (height >= width && height > maxSide) {
        width = Math.round((width * maxSide) / height);
        height = maxSide;
      }

      const canvas = document.createElement('canvas');
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, width, height);

      const outDataUrl = canvas.toDataURL('image/jpeg', 0.82);
      const commaIndex = outDataUrl.indexOf(',');
      return {
        base64: commaIndex >= 0 ? outDataUrl.slice(commaIndex + 1) : outDataUrl,
        previewUrl: dataUrl,
        width,
        height,
        mime: 'image/jpeg'
      };
    }

    async function sendMessage(promptText) {
      if (state.busy) return;

      const model = el.model.value;
      if (!model) {
        setStatus('No model selected');
        return;
      }

      state.busy = true;
      el.sendBtn.disabled = true;
      setStatus(`Running ${model}...`);

      state.messages.push({ role: 'user', content: promptText });
      renderMessages();

      const payloadMessages = state.messages.map(message => ({
        role: message.role,
        content: message.content
      }));

      if (state.imageBase64) {
        payloadMessages[payloadMessages.length - 1].images = [state.imageBase64];
      }

      try {
        const response = await fetch('/api/ollama/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            model,
            stream: false,
            messages: payloadMessages,
            options: {
              temperature: Number(el.temperature.value || 0.7),
              num_predict: Number(el.numPredict.value || 512)
            }
          })
        });

        if (!response.ok) {
          const text = await response.text();
          throw new Error(text || `HTTP ${response.status}`);
        }

        const data = await response.json();
        const answer = data?.message?.content || data?.response || data?.message?.thinking || '';

        if (!answer) {
          throw new Error('The model returned an empty response.');
        }

        state.messages.push({ role: 'assistant', content: answer });
        state.imageBase64 = null;
        state.imageMime = null;
        state.imageName = null;
        state.imagePreviewUrl = null;
        state.imageWidth = null;
        state.imageHeight = null;
        renderImageInfo();
        renderMessages();
        setStatus('Ready');
      } catch (error) {
        state.messages.push({ role: 'system', content: `Error: ${error.message}` });
        renderMessages();
        setStatus('Request failed');
      } finally {
        state.busy = false;
        el.sendBtn.disabled = false;
      }
    }

    el.composer.addEventListener('submit', async (event) => {
      event.preventDefault();
      const promptText = el.prompt.value.trim();
      if (!promptText) return;
      el.prompt.value = '';
      await sendMessage(promptText);
    });

    el.prompt.addEventListener('keydown', (event) => {
      if (event.key === 'Enter' && !event.shiftKey) {
        event.preventDefault();
        el.composer.requestSubmit();
      }
    });

    el.refreshBtn.addEventListener('click', loadModels);

    el.clearBtn.addEventListener('click', () => {
      state.messages = [];
      renderMessages();
      setStatus('Chat cleared');
    });

    el.imageInput.addEventListener('change', async (event) => {
      const file = event.target.files?.[0];
      if (!file) return;

      try {
        const optimized = await imageFileToOptimizedBase64(file);
        state.imageBase64 = optimized.base64;
        state.imageMime = optimized.mime;
        state.imageName = file.name;
        state.imagePreviewUrl = optimized.previewUrl;
        state.imageWidth = optimized.width;
        state.imageHeight = optimized.height;
        renderImageInfo();
        setStatus(`Attached ${file.name}`);
      } catch (error) {
        setStatus(`Could not read image: ${error.message}`);
      } finally {
        el.imageInput.value = '';
      }
    });

    el.removeImageBtn.addEventListener('click', () => {
      state.imageBase64 = null;
      state.imageMime = null;
      state.imageName = null;
      state.imagePreviewUrl = null;
      state.imageWidth = null;
      state.imageHeight = null;
      renderImageInfo();
      setStatus('Image removed');
    });

    renderMessages();
    renderImageInfo();
    loadModels();
  </script>
</body>
</html>

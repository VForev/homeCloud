<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HomeCloud</title>
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <style>
    .thread-layout {
      margin-top: 16px;
      display: grid;
      grid-template-columns: minmax(280px, 360px) minmax(0, 1fr);
      gap: 14px;
      align-items: start;
    }

    .compose-panel h2,
    .feed-panel h2 {
      margin: 0;
      font-size: 1.18rem;
    }

    .small-muted {
      color: var(--muted);
      font-size: 0.84rem;
    }

    #progressContainer {
      width: 100%;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 999px;
      margin-top: 10px;
      overflow: hidden;
      display: none;
    }

    #progressBar {
      width: 0%;
      height: 10px;
      background: linear-gradient(135deg, #6c63ff, #5fbbe8);
      transition: width 0.2s ease;
    }

    .status-pill {
      margin-top: 10px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 6px 10px;
      background: rgba(255, 255, 255, 0.06);
      color: var(--muted);
      font-size: 0.82rem;
    }

    .status-pill.error {
      border-color: rgba(255, 93, 115, 0.5);
      color: #ffd8de;
      background: rgba(255, 93, 115, 0.13);
    }

    .feed-head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 10px;
    }

    .thread-list {
      display: grid;
      gap: 10px;
      max-height: calc(100vh - 280px);
      overflow-y: auto;
      padding-right: 2px;
    }

    .thread-card {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.05);
      padding: 10px;
      margin-left: calc(var(--depth) * 20px);
      position: relative;
    }

    .thread-card.reply {
      border-left: 3px solid rgba(124, 156, 255, 0.45);
    }

    .thread-main {
      display: grid;
      grid-template-columns: 28px minmax(0, 1fr);
      gap: 10px;
      align-items: start;
    }

    .vote-rail {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      color: var(--muted);
      font-size: 0.82rem;
      user-select: none;
    }

    .vote-arrow {
      line-height: 1;
      font-size: 0.95rem;
      opacity: 0.8;
    }

    .thread-meta {
      display: flex;
      gap: 8px;
      align-items: baseline;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 0.82rem;
    }

    .thread-author {
      color: var(--text);
      font-weight: 600;
      font-size: 0.9rem;
    }

    .thread-body {
      margin-top: 6px;
      color: var(--text);
      line-height: 1.55;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    .thread-actions {
      margin-top: 8px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .link-btn {
      border: 1px solid rgba(255, 255, 255, 0.16);
      background: rgba(255, 255, 255, 0.05);
      color: var(--muted);
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 0.78rem;
      cursor: pointer;
    }

    .link-btn:hover {
      color: var(--text);
      border-color: rgba(124, 156, 255, 0.45);
    }

    .reply-box {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px dashed rgba(255, 255, 255, 0.16);
      display: grid;
      gap: 8px;
    }

    .reply-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .empty-state {
      border: 1px dashed var(--line);
      border-radius: 14px;
      padding: 20px;
      color: var(--muted);
      text-align: center;
    }

    @media (max-width: 980px) {
      .thread-layout {
        grid-template-columns: 1fr;
      }

      .thread-list {
        max-height: none;
      }

      .thread-card {
        margin-left: calc(var(--depth) * 12px);
      }
    }
  </style>
  <script>window.CAN_DELETE = {{ 'true' if can_delete else 'false' }};</script>
</head>
<body>
  <main class="page-shell">
    <div class="container">
      <div class="top-bar">
        <h1 class="page-title" style="text-align:center;">Comms Thread</h1>
        <p class="page-subtitle" style="text-align:center;">Reddit-style discussion board with threaded replies.</p>
        <div class="actions-row" style="justify-content:center;">
          <a href="{{ url_for('logout') }}" class="btn secondary">Logout</a>
        </div>
      </div>

      <div class="thread-layout">
        <section class="panel compose-panel">
          <h2>Create Post</h2>
          <p class="small-muted" style="margin:8px 0 0;">Start a new thread. Use reply under any post to continue discussion.</p>

          <form id="rootForm" class="form-stack" style="margin-top:12px;">
            <input type="text" id="author" name="author" placeholder="Username (optional)" maxlength="50">
            <textarea id="rootText" name="text" rows="5" placeholder="What do you want to share?" maxlength="2000" required></textarea>
            <div class="actions-row" style="margin-top:0;">
              <button id="sendRootBtn" type="submit" class="btn">Post</button>
              <button id="clearBtn" type="button" class="btn secondary" {% if not can_delete %}style="display:none;"{% endif %}>Clear All</button>
            </div>
            <div id="progressContainer"><div id="progressBar"></div></div>
          </form>

          <div id="statusNote" class="status-pill">Ready</div>
        </section>

        <section class="panel feed-panel">
          <div class="feed-head">
            <h2>Thread Feed</h2>
            <div class="small-muted"><span id="messageCount">0</span> messages • <span id="lastUpdated">Not loaded</span></div>
          </div>
          <div id="threadList" class="thread-list"></div>
        </section>
      </div>
    </div>
  </main>

  <script>
    const rootForm = document.getElementById('rootForm');
    const sendRootBtn = document.getElementById('sendRootBtn');
    const clearBtn = document.getElementById('clearBtn');
    const authorInput = document.getElementById('author');
    const rootText = document.getElementById('rootText');
    const threadList = document.getElementById('threadList');
    const messageCount = document.getElementById('messageCount');
    const lastUpdated = document.getElementById('lastUpdated');
    const statusNote = document.getElementById('statusNote');
    const progressContainer = document.getElementById('progressContainer');
    const progressBar = document.getElementById('progressBar');

    let loading = false;

    function canDelete() {
      return window.CAN_DELETE === true || window.CAN_DELETE === 'true';
    }

    function setStatus(text, error) {
      statusNote.textContent = text;
      statusNote.classList.toggle('error', !!error);
    }

    function formatTimestamp(tsSeconds) {
      const dt = new Date((tsSeconds || 0) * 1000);
      if (Number.isNaN(dt.getTime())) return 'Unknown time';
      return dt.toLocaleString();
    }

    function authorLabel(author) {
      const safe = (author || '').trim() || 'Anonymous';
      return `u/${safe.replace(/^u\//, '')}`;
    }

    function clampDepth(depth) {
      return Math.max(0, Math.min(depth, 6));
    }

    function buildThreadTree(messages) {
      const map = new Map();
      messages.forEach((m) => {
        map.set(m.id, { ...m, children: [] });
      });

      const roots = [];
      map.forEach((node) => {
        if (node.parent_id && map.has(node.parent_id)) {
          map.get(node.parent_id).children.push(node);
        } else {
          roots.push(node);
        }
      });

      roots.sort((a, b) => (b.ts || 0) - (a.ts || 0));

      function sortChildren(list) {
        list.sort((a, b) => (a.ts || 0) - (b.ts || 0));
        list.forEach((child) => sortChildren(child.children));
      }

      roots.forEach((root) => sortChildren(root.children));
      return roots;
    }

    function createButton(label, onClick) {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'link-btn';
      btn.textContent = label;
      btn.addEventListener('click', onClick);
      return btn;
    }

    async function postMessage(text, parentId) {
      const payload = {
        author: authorInput.value.trim(),
        text: text.trim()
      };
      if (parentId) payload.parent_id = parentId;

      const response = await fetch('/api/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });

      if (!response.ok) {
        const err = await response.json().catch(() => ({}));
        throw new Error(err.msg || 'Post failed');
      }
    }

    async function deleteMessage(id) {
      const response = await fetch('/api/messages/delete', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id })
      });
      if (!response.ok) {
        const err = await response.json().catch(() => ({}));
        throw new Error(err.msg || 'Delete failed');
      }
      return response.json().catch(() => ({}));
    }

    function createReplyBox(parentId, depth, onDone) {
      const wrap = document.createElement('div');
      wrap.className = 'reply-box';

      const area = document.createElement('textarea');
      area.rows = 3;
      area.maxLength = 2000;
      area.placeholder = `Reply to thread (${2000} max chars)`;

      const actions = document.createElement('div');
      actions.className = 'reply-actions';

      const cancelBtn = createButton('Cancel', () => onDone(false));
      const postBtn = document.createElement('button');
      postBtn.type = 'button';
      postBtn.className = 'btn';
      postBtn.textContent = 'Reply';

      postBtn.addEventListener('click', async () => {
        const text = area.value.trim();
        if (!text) {
          setStatus('Reply cannot be empty.', true);
          return;
        }
        postBtn.disabled = true;
        try {
          await postMessage(text, parentId);
          setStatus('Reply posted.', false);
          onDone(true);
        } catch (error) {
          setStatus(error.message || 'Reply failed.', true);
          postBtn.disabled = false;
        }
      });

      actions.append(cancelBtn, postBtn);
      wrap.append(area, actions);
      if (depth >= 4) {
        area.placeholder = 'Reply to thread (deep nesting compacted on mobile)';
      }
      return wrap;
    }

    function renderThreadNodes(nodes, host, depth) {
      nodes.forEach((node) => {
        const card = document.createElement('article');
        card.className = 'thread-card' + (depth > 0 ? ' reply' : '');
        card.style.setProperty('--depth', String(clampDepth(depth)));

        const main = document.createElement('div');
        main.className = 'thread-main';

        const rail = document.createElement('div');
        rail.className = 'vote-rail';
        rail.innerHTML = '<span class="vote-arrow">▲</span><span>•</span><span class="vote-arrow">▼</span>';

        const content = document.createElement('div');

        const meta = document.createElement('div');
        meta.className = 'thread-meta';

        const author = document.createElement('span');
        author.className = 'thread-author';
        author.textContent = authorLabel(node.author);

        const when = document.createElement('span');
        when.textContent = formatTimestamp(node.ts);

        const detail = document.createElement('span');
        detail.textContent = depth === 0 ? 'Thread' : `Reply level ${depth}`;

        meta.append(author, when, detail);

        const body = document.createElement('div');
        body.className = 'thread-body';
        body.textContent = node.text || '';

        const actions = document.createElement('div');
        actions.className = 'thread-actions';

        const replyBtn = createButton('Reply', () => {
          const existing = card.querySelector('.reply-box');
          if (existing) {
            existing.remove();
            return;
          }
          const replyBox = createReplyBox(node.id, depth + 1, async (refresh) => {
            replyBox.remove();
            if (refresh) await loadMessages();
          });
          card.appendChild(replyBox);
        });
        actions.appendChild(replyBtn);

        if (canDelete()) {
          const delBtn = createButton('Delete', async () => {
            if (!confirm('Delete this message and all its replies?')) return;
            try {
              await deleteMessage(node.id);
              setStatus('Message deleted.', false);
              await loadMessages();
            } catch (error) {
              setStatus(error.message || 'Delete failed.', true);
            }
          });
          actions.appendChild(delBtn);
        }

        content.append(meta, body, actions);
        main.append(rail, content);
        card.appendChild(main);
        host.appendChild(card);

        if (node.children && node.children.length) {
          renderThreadNodes(node.children, host, depth + 1);
        }
      });
    }

    function renderMessages(messages) {
      threadList.innerHTML = '';
      messageCount.textContent = String(messages.length);

      if (!messages.length) {
        const empty = document.createElement('div');
        empty.className = 'empty-state';
        empty.textContent = 'No threads yet. Create the first post.';
        threadList.appendChild(empty);
        return;
      }

      const roots = buildThreadTree(messages);
      renderThreadNodes(roots, threadList, 0);
    }

    async function loadMessages() {
      if (loading) return;
      loading = true;
      try {
        const response = await fetch('/api/messages', { cache: 'no-store' });
        if (!response.ok) {
          threadList.innerHTML = '<div class="empty-state">Unable to load messages.</div>';
          setStatus('Load failed or unauthorized.', true);
          return;
        }
        const payload = await response.json();
        renderMessages(payload);
        lastUpdated.textContent = new Date().toLocaleTimeString();
      } catch (_) {
        threadList.innerHTML = '<div class="empty-state">Unable to load messages.</div>';
        setStatus('Connection issue while loading threads.', true);
      } finally {
        loading = false;
      }
    }

    rootForm.addEventListener('submit', async (event) => {
      event.preventDefault();
      const text = rootText.value.trim();
      if (!text) {
        setStatus('Post cannot be empty.', true);
        return;
      }

      sendRootBtn.disabled = true;
      progressContainer.style.display = 'block';
      progressBar.style.width = '25%';

      try {
        await postMessage(text, null);
        rootText.value = '';
        progressBar.style.width = '90%';
        setStatus('Thread posted.', false);
        await loadMessages();
        progressBar.style.width = '100%';
        setTimeout(() => {
          progressBar.style.width = '0%';
          progressContainer.style.display = 'none';
        }, 240);
      } catch (error) {
        setStatus(error.message || 'Post failed.', true);
        progressBar.style.width = '0%';
        progressContainer.style.display = 'none';
      } finally {
        sendRootBtn.disabled = false;
      }
    });

    if (clearBtn) {
      clearBtn.addEventListener('click', async () => {
        if (!confirm('Clear all messages?')) return;
        clearBtn.disabled = true;
        try {
          const response = await fetch('/api/messages/clear', { method: 'POST' });
          if (!response.ok) {
            setStatus('Clear failed.', true);
            return;
          }
          setStatus('All threads cleared.', false);
          await loadMessages();
        } catch (_) {
          setStatus('Clear failed.', true);
        } finally {
          clearBtn.disabled = false;
        }
      });
    }

    document.addEventListener('DOMContentLoaded', () => {
      loadMessages();
      setInterval(loadMessages, 5000);
    });
  </script>
</body>
</html>

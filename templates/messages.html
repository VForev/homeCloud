<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Messages</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <style>
    #progressContainer {
      width: 100%;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 999px;
      margin-top: 6px;
      display: none;
      overflow: hidden;
    }
    #progressBar {
      width: 0%;
      height: 10px;
      background: linear-gradient(135deg, #6c63ff, #5fbbe8);
      transition: width 0.2s;
    }
    .messages-grid {
      max-height: calc(100vh - 330px);
      overflow-y: auto;
    }

    @media (max-width: 700px) {
      .messages-grid {
        max-height: none;
        overflow-y: visible;
      }

      #msgForm .actions-row {
        flex-direction: column;
      }
    }
  </style>
  <script>window.CAN_DELETE = {{ 'true' if can_delete else 'false' }};</script>
</head>
<body>
  <main class="page-shell">
  <div class="container">

    <div class="top-bar">
      <h1 class="page-title" style="text-align:center;">Communication Messaging</h1>
      <p class="page-subtitle" style="text-align:center;">Private shared message board for your project.</p>

      <form id="msgForm" class="form-stack" style="max-width:680px; margin:16px auto 0;">
        <input type="text" id="author" name="author" placeholder="Your name (optional)">
        <textarea id="text" name="text" rows="4" placeholder="Write a message..."></textarea>

        <div class="actions-row" style="margin-top:0; width:100%; justify-content:center;">
          <button type="submit" class="btn" style="min-width:150px;">Send</button>
          <button id="clearBtn" type="button" class="btn secondary" {% if not can_delete %}style="display:none;"{% endif %}>Clear (admin)</button>
          <a href="{{ url_for('logout') }}" class="btn secondary">Logout</a>
        </div>

        <div id="progressContainer">
          <div id="progressBar"></div>
        </div>
      </form>

      <p class="helper-text" style="text-align:center; margin-top:10px;">Everyone with the message passcode can read and post. Newest messages appear first.</p>
    </div>

    <div class="messages-grid" id="messagesGrid"></div>
  </div>
  </main>

  <div id="loadingOverlay" style="position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.82);display:flex;justify-content:center;align-items:center;z-index:9999;">
    <div class="spinner"></div>
  </div>

  <script>
    const grid = document.getElementById('messagesGrid');
    const form = document.getElementById('msgForm');
    const clearBtn = document.getElementById('clearBtn');
    const progressContainer = document.getElementById('progressContainer');
    const progressBar = document.getElementById('progressBar');

    async function loadMessages() {
      const res = await fetch('/api/messages');
      if (!res.ok) {
        grid.innerHTML = '<div class="message-card"><div class="message-text">Not authorized.</div></div>';
        hideOverlay();
        return;
      }
      const data = await res.json();
      grid.innerHTML = '';
      data.forEach((m) => {
        const card = document.createElement('div');
        card.className = 'message-card';

        const meta = document.createElement('div');
        meta.className = 'message-meta';
        const when = new Date((m.ts || 0) * 1000);
        const who = (m.author && m.author.trim()) ? m.author.trim() : 'Anonymous';
        meta.textContent = `${who} • ${when.toLocaleString()}`;

        const body = document.createElement('div');
        body.className = 'message-text';
        body.textContent = m.text || '';

        card.appendChild(meta);
        card.appendChild(body);

        if (window.CAN_DELETE === true || window.CAN_DELETE === 'true') {
          const del = document.createElement('button');
          del.className = 'btn secondary';
          del.textContent = 'Delete';
          del.style.marginTop = '8px';
          del.addEventListener('click', async () => {
            if (!confirm('Delete this message?')) return;
            const r = await fetch('/api/messages/delete', {
              method: 'POST',
              headers: {'Content-Type':'application/json'},
              body: JSON.stringify({ id: m.id })
            });
            if (r.ok) loadMessages();
            else {
              const err = await r.json().catch(() => ({}));
              alert(err.msg || 'Failed to delete.');
            }
          });
          card.appendChild(del);
        }

        grid.appendChild(card);
      });
      hideOverlay();
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const author = document.getElementById('author').value.trim();
      const text = document.getElementById('text').value.trim();
      if (!text) return;

      progressContainer.style.display = 'block';
      progressBar.style.width = '25%';

      const res = await fetch('/api/messages', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ author, text })
      });

      if (res.ok) {
        progressBar.style.width = '80%';
        document.getElementById('text').value = '';
        await loadMessages();
        progressBar.style.width = '100%';
        setTimeout(() => {
          progressBar.style.width = '0%';
          progressContainer.style.display = 'none';
        }, 300);
      } else {
        alert('Failed to post message');
        progressBar.style.width = '0%';
        progressContainer.style.display = 'none';
      }
    });

    if (clearBtn) {
      clearBtn.addEventListener('click', async () => {
        if (!confirm('Clear all messages? (admin only)')) return;
        const r = await fetch('/api/messages/clear', { method:'POST' });
        if (r.ok) loadMessages();
        else alert('Not authorized or failed.');
      });
    }

    function hideOverlay() {
      const overlay = document.getElementById('loadingOverlay');
      if (!overlay) return;
      overlay.style.opacity = '0';
      setTimeout(() => { overlay.style.display = 'none'; }, 320);
    }

    document.addEventListener('DOMContentLoaded', () => {
      loadMessages();
      setInterval(loadMessages, 5000);
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        #progressContainer {
            width: 100%;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 999px;
            margin-top: 8px;
            display: none;
            overflow: hidden;
        }
        #progressBar {
            width: 0%;
            height: 10px;
            background: linear-gradient(135deg, #6c63ff, #5fbbe8);
            transition: width 0.2s;
        }
        .upload-wrapper {
            width: 100%;
        }

        .gallery {
            max-height: calc(100vh - 320px);
            overflow-y: auto;
        }

        @media (max-width: 700px) {
            .gallery {
                max-height: none;
                overflow-y: visible;
            }
        }
    </style>
</head>
<body>
    <main class="page-shell">
    <div class="container">
        <div class="top-bar">
            <h1 class="page-title" style="text-align:center;">Cloud Storage</h1>
            <p class="page-subtitle" style="text-align:center;">Upload and browse your images with quick full-size preview.</p>

            <form id="uploadForm" enctype="multipart/form-data" class="form-stack" style="max-width:520px; margin:16px auto 0;">
                <div class="upload-wrapper">
                    <input type="file" name="images" multiple>
                </div>
                <button type="submit" class="btn" style="width:100%;">Upload</button>
                <div id="progressContainer">
                        <div id="progressBar"></div>
                </div>
            </form>

            <div class="actions-row" style="justify-content:center;">
                <a href="{{ url_for('logout') }}" class="btn secondary">Logout</a>
            </div>

            <p class="helper-text" style="text-align:center; margin-top:10px;">
                Click an image for full size. Use arrows or swipe left/right.
            </p>
        </div>

        <div class="gallery">
            {% for image in images %}
                <img src="/images/{{ image }}" alt="{{ image }}" data-index="{{ loop.index0 }}" onclick="openLightbox({{ loop.index0 }})">
            {% endfor %}
        </div>
    </div>
    </main>

    <div class="lightbox" id="lightbox">
        <button class="nav-btn prev" onclick="prevImage()">&#10094;</button>
        <img id="lightboxImage" src="">
        <button class="nav-btn next" onclick="nextImage()">&#10095;</button>
    </div>

    <script>
        // Lightbox logic
        const images = [...document.querySelectorAll('.gallery img')];
        let currentIndex = 0;
        const lightbox = document.getElementById('lightbox');
        const lightboxImage = document.getElementById('lightboxImage');

        function openLightbox(index) {
            currentIndex = index;
            showImage();
            lightbox.style.display = 'flex';
        }

        function showImage() {
            lightboxImage.src = images[currentIndex].src;
        }

        function closeLightbox() {
            lightbox.style.display = 'none';
        }

        function nextImage() {
            currentIndex = (currentIndex + 1) % images.length;
            showImage();
        }

        function prevImage() {
            currentIndex = (currentIndex - 1 + images.length) % images.length;
            showImage();
        }

        lightbox.addEventListener('click', e => {
            if (e.target === lightbox) closeLightbox();
        });

        // Swipe for mobile
        let startX = 0;
        lightbox.addEventListener('touchstart', e => startX = e.touches[0].clientX);
        lightbox.addEventListener('touchend', e => {
            const endX = e.changedTouches[0].clientX;
            if (startX - endX > 50) nextImage();
            if (endX - startX > 50) prevImage();
        });

        // Upload with progress bar
        const uploadForm = document.getElementById('uploadForm');
        const progressContainer = document.getElementById('progressContainer');
        const progressBar = document.getElementById('progressBar');

        uploadForm.addEventListener('submit', function(e) {
            e.preventDefault();
            const formData = new FormData(uploadForm);

            const xhr = new XMLHttpRequest();
            xhr.open('POST', '/upload_image', true);

            xhr.upload.addEventListener('progress', function(e) {
                if (e.lengthComputable) {
                    const percent = (e.loaded / e.total) * 100;
                    progressContainer.style.display = 'block';
                    progressBar.style.width = percent + '%';
                }
            });

            xhr.onload = function() {
                if (xhr.status === 200) {
                    location.reload(); // reload to show new images
                } else {
                    alert('Upload failed!');
                }
            };

            xhr.send(formData);
        });

        // Loading spinner logic
        document.addEventListener("DOMContentLoaded", function() {
            const overlay = document.getElementById("loadingOverlay");
            const galleryImages = document.querySelectorAll(".gallery img");
            let loaded = 0;
            let total = galleryImages.length;

            if (total === 0) {
            overlay.style.display = "none";
            return;
            }

            function hideOverlay() {
            overlay.style.opacity = "0";
            setTimeout(() => { overlay.style.display = "none"; }, 320);
            }

            galleryImages.forEach(img => {
            if (img.complete) {
                loaded++;
                if (loaded >= total) hideOverlay();
            } else {
                img.addEventListener('load', () => {
                loaded++;
                if (loaded >= total) hideOverlay();
                });
                img.addEventListener('error', () => {
                loaded++;
                if (loaded >= total) hideOverlay();
                });
            }
            });
        });
    </script>

    <div id="loadingOverlay" style="position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.82);display:flex;justify-content:center;align-items:center;z-index:9999;">
        <div class="spinner"></div>
    </div>

</body>
</html>
